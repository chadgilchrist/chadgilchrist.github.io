<div *ngIf="project">
    <div class="container">
        
        <div class="title">
            <p>{{project.projectname}}</p>
            <p>{{project.description}}</p>
        </div>

        <div id="carousel-example-2" class="carousel slide carousel-fade z-depth-1-half" data-ride="carousel">
            <ol class="carousel-indicators">
                <li data-target="#carousel-example-2" data-slide-to="0" class="active"></li>
                <li data-target="#carousel-example-2" data-slide-to="1"></li>
                <li data-target="#carousel-example-2" data-slide-to="2"></li>
                <li data-target="#carousel-example-2" data-slide-to="3"></li>
                <li data-target="#carousel-example-2" data-slide-to="4"></li>
                <li data-target="#carousel-example-2" data-slide-to="5"></li> 
                <li data-target="#carousel-example-2" data-slide-to="6"></li>
                <li data-target="#carousel-example-2" data-slide-to="7"></li>
                <li data-target="#carousel-example-2" data-slide-to="8"></li>
                <li data-target="#carousel-example-2" data-slide-to="9"></li>
            </ol>
        
            <div class="carousel-inner" role="listbox">
                <div class="carousel-item active">
                    <div class="view">
                        <img class="d-block w-100" [src]="project.mainimage" alt="First slide">
                        <div class="mask rgba-black-light"></div>
                    </div>
                </div>
                <div *ngFor="let image of project.images" class="carousel-item">
                    <div class="view">
                        <img class="d-block w-100" [src]="image" alt="Second slide">
                        <div class="mask rgba-black-light"></div>
                    </div>
                </div>
            </div>

            <a class="carousel-control-prev" href="#carousel-example-2" role="button" data-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="sr-only">Previous</span>
            </a>
            <a class="carousel-control-next" href="#carousel-example-2" role="button" data-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="sr-only">Next</span>
            </a>

        </div>
    
        <hr class="featurette-divider">
    </div>
</div>
